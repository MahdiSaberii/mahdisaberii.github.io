short_bio: >-
  My name is Mahdi Saberi, and I am a Ph.D. candidate in Electrical Engineering department at the University of
  Minnesota, US. I work with <a href="https://cse.umn.edu/ece/mehmet-akcakaya" target="_blank" rel="noopener">Mehmet Akçakaya</a> at the Center for
  Magnetic Resonance Research (CMRR). My research focuses on physics-guided
  deep learning for medical image reconstruction, with an emphasis on
  accelerated MRI, inverse problems, and trustworthy AI for medical imaging.
  My work has been published at leading AI and medical imaging venues,
  including ICML, ISBI, ISMRM, and IEEE MLSP, and has been recognized with
  several awards and oral presentations. 
  

